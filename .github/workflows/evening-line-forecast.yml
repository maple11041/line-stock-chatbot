name: Evening LINE stock subscription forecast

on:
  schedule:
    # 20:30 Asia/Taipei every day. GitHub Actions cron uses UTC.
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
      # Manual runs double as a LINE connectivity check.
      SEND_EMPTY: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Send LINE forecast
        run: uv run line-stock-forecast

