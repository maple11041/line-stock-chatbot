name: Daily LINE stock subscription notify

on:
  schedule:
    # 07:30 Asia/Taipei every day. GitHub Actions cron uses UTC.
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
      SEND_EMPTY: "false"
      INCLUDE_BONDS: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Send LINE notification
        run: uv run line-stock-chatbot

